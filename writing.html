<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sidebar"></div>
  <div id="mobile-header"></div>
  <div id="mobile-drawer"></div>
  <main id="main">
    <div class="page">
      <div class="page-header">
        <div class="page-label">Technical Writing & Reflections</div>
        <h1 class="page-title">How I Think & Learn</h1>
        <p class="page-subtitle">Retrospectives, engineering decision logs, product critiques. The why behind the what.</p>
      </div>
      <div id="writing-list"></div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="nav.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.title = "Writing — " + PORTFOLIO.name;
      initNav();
      const list = document.getElementById("writing-list");
      if (!PORTFOLIO.writing.length) {
        list.innerHTML = `<div class="empty-state"><p>Add articles and reflections in <code>data.js</code> → <code>writing</code></p></div>`;
      } else {
        list.innerHTML = PORTFOLIO.writing.map(w => `
          <div class="writing-item">
            <div class="writing-type">${w.type}</div>
            <div class="writing-title">${w.link ? `<a href="${w.link}" target="_blank">${w.title}</a>` : w.title}</div>
            <div class="writing-date">${w.date}</div>
            <div class="writing-summary">${w.summary}</div>
          </div>`).join("");
      }
    });
  </script>
</body>
</html>
